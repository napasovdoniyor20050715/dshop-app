services:
  - type: web
    name: shophub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shophub-db
          property: connectionString

databases:
  - name: shophub-db
    databaseName: shophub
    user: shophub
